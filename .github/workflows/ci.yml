name: release

permissions:
    contents: write

on:
    push:
    pull_request:

env:
    GITHUB_TOKEN: ${{ github.token }}
    RUST_BACKTRACE: 1

jobs:
    release:
        name: Release - ${{ matrix.platform.os-name }}
        strategy:
            fail-fast: false
            matrix:
                # https://github.com/actions/runner-images
                # https://github.com/apps/rise-risc-v-runners-personal
                platform:
                    - os-name: Linux-x86_64
                      runs-on: ubuntu-24.04
                      target: x86_64-unknown-linux-musl
                      use-cross: true
                    - os-name: Linux-aarch64
                      runs-on: ubuntu-24.04
                      target: aarch64-unknown-linux-musl
                      use-cross: true
                    - os-name: Linux-riscv64
                      runs-on: ubuntu-24.04-riscv
                      target: riscv64gc-unknown-linux-musl
                      use-cross: false

                    - os-name: Windows-x86_64
                      runs-on: windows-2025
                      target: x86_64-pc-windows-msvc
                      use-cross: true
                    - os-name: Windows-aarch64
                      runs-on: windows-11-arm
                      target: aarch64-pc-windows-msvc
                      use-cross: true

                    - os-name: macOS-aarch64
                      runs-on: macos-26
                      target: aarch64-apple-darwin
                      use-cross: true
        runs-on: ${{ matrix.platform.runs-on }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  target: ${{ matrix.platform.target }}
                  override: true
                  profile: minimal
            - uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.platform.runs-on }}-${{ matrix.platform.target }}

            # --- Build ---
            # Each target picks exactly one of the three build steps below.

            # macOS: cargo-post runs post_build.rs to package the .app bundles.
            - name: Install cargo-post (macOS only)
              if: "matrix.platform.target == 'aarch64-apple-darwin'"
              run: cargo install cargo-post
            - name: Build Sender & Receiver with Cargo post-build (macOS only)
              if: "matrix.platform.target == 'aarch64-apple-darwin'"
              run: |
                  cargo post build --package open_remote_url_sender --locked --release --target ${{ matrix.platform.target }}
                  cargo post build --package open_remote_url_receiver --locked --release --target ${{ matrix.platform.target }}

            # RISC-V: native build on the RISC-V runner, statically linked.
            # The runner is a real riscv64 machine running glibc-based Ubuntu, so
            # there's no prebuilt `riscv64-linux-musl-gcc` cross toolchain for the
            # musl target (an x86_64-hosted one, like sophgo/host-tools, won't run
            # here). `musl-tools` gives us a native `musl-gcc` for this arch, which
            # cc-rs/the linker are pointed at explicitly since its name doesn't
            # match cc-rs's `<triple>-gcc` naming convention.
            - name: Install musl toolchain (RISCV only)
              if: matrix.platform.target == 'riscv64gc-unknown-linux-musl'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y musl-tools
            - name: Build Sender & Receiver with Cargo (RISCV only)
              if: matrix.platform.target == 'riscv64gc-unknown-linux-musl'
              uses: actions-rs/cargo@v1
              env:
                  RUSTFLAGS: "-Ctarget-feature=+crt-static"
                  CC_riscv64gc_unknown_linux_musl: musl-gcc
                  CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
              with:
                  use-cross: ${{ matrix.platform.use-cross }}
                  command: build
                  args: --manifest-path Cargo.toml --locked --release --target ${{ matrix.platform.target }}

            # Everything else (Linux x86_64/aarch64, Windows): plain Cargo or Cross.
            - name: Build Sender & Receiver with Cargo or Cross (non-macOS)
              if: "matrix.platform.target != 'aarch64-apple-darwin' && matrix.platform.target != 'riscv64gc-unknown-linux-musl'"
              uses: actions-rs/cargo@v1
              with:
                  use-cross: ${{ matrix.platform.use-cross }}
                  command: build
                  args: --manifest-path Cargo.toml --locked --release --target ${{ matrix.platform.target }}

            # Decide which extra files ship alongside each binary in the release.
            # The 4 README translations always ship; the rest differ per OS.
            - name: Determine Extra Files
              shell: bash
              run: |
                  readmes="README.md README.ja_JP.md README.ja_EZ.md README.zh_CN.md"

                  case "${{ matrix.platform.target }}" in
                    *-apple-darwin)
                      # macOS ships the packaged .app bundles.
                      sender_files="OpenRemoteURLSender.app.zip sender/inactive.env"
                      receiver_files="OpenRemoteURLReceiver.app.zip receiver/inactive.env"
                      ;;
                    *-pc-windows-*)
                      # Windows ships just the bare binary + its config.
                      sender_files="sender/inactive.env"
                      receiver_files="receiver/inactive.env"
                      ;;
                    *)
                      # Linux (incl. RISC-V) ships the shell install helpers.
                      scripts="scripts/install/install.sh scripts/uninstall/uninstall.sh scripts/config/config.sh"
                      sender_files="$scripts sender/inactive.env"
                      receiver_files="$scripts receiver/inactive.env"
                      ;;
                  esac

                  # Append a newline-separated multiline env var (name + files...).
                  write_env() {
                    local name="$1"; shift
                    {
                      echo "$name<<EOF"
                      printf '%s\n' "$@"
                      echo "EOF"
                    } >> "$GITHUB_ENV"
                  }

                  write_env EXTRA_FILES          $sender_files   $readmes
                  write_env RECEIVER_EXTRA_FILES $receiver_files $readmes

            # --- Release ---
            # Each artifact is uploaded by a "1" step; the matching "2" step is a
            # retry that only runs `if: failure()`. The random `sleep`s stagger the
            # parallel matrix jobs so they don't race to create the same release.

            - name: Wait
              shell: bash
              run: sleep $((RANDOM % 20 + 3))
            - name: Release Sender 1
              id: release-sender-1
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url-sender
              with:
                  working-directory: .
                  executable-name: open-remote-url-sender
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }
            - name: Wait
              if: failure()
              shell: bash
              run: sleep $((RANDOM % 20 + 5))
            - name: Release Sender 2
              if: failure()
              id: release-sender-2
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url-sender
              with:
                  working-directory: .
                  executable-name: open-remote-url-sender
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }

            - name: Wait
              shell: bash
              run: sleep $((RANDOM % 20 + 3))
            - name: Release Receiver 1
              id: release-receiver-1
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url_receiver
              with:
                  working-directory: .
                  executable-name: open-remote-url-receiver
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.RECEIVER_EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }
            - name: Wait
              if: failure()
              shell: bash
              run: sleep $((RANDOM % 20 + 5))
            - name: Release Receiver 2
              if: failure()
              id: release-receiver-2
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url_receiver
              with:
                  working-directory: .
                  executable-name: open-remote-url-receiver
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.RECEIVER_EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }
