name: release

permissions:
    contents: write

on:
    push:
    pull_request:

env:
    GITHUB_TOKEN: ${{ github.token }}
    RUST_BACKTRACE: 1

jobs:
    release:
        name: Release - ${{ matrix.platform.os-name }}
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - os-name: Linux-x86_64
                      runs-on: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      use-cross: true
                    - os-name: Linux-aarch64
                      runs-on: ubuntu-latest
                      target: aarch64-unknown-linux-musl
                      use-cross: true
                    - os-name: Linux-riscv64
                      runs-on: ubuntu-24.04-riscv
                      target: riscv64gc-unknown-linux-musl
                      use-cross: false

                    - os-name: Windows-x86_64
                      runs-on: windows-latest
                      target: x86_64-pc-windows-msvc
                      use-cross: true
                    - os-name: Windows-aarch64
                      runs-on: windows-latest
                      target: aarch64-pc-windows-msvc
                      use-cross: true

                    - os-name: macOS-x86_64
                      runs-on: macos-latest
                      target: x86_64-apple-darwin
                      use-cross: true
                    - os-name: macOS-aarch64
                      runs-on: macos-latest
                      target: aarch64-apple-darwin
                      use-cross: true
        runs-on: ${{ matrix.platform.runs-on }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  target: ${{ matrix.platform.target }}
                  override: true
                  profile: minimal
            - uses: Swatinem/rust-cache@v2
            - name: Install cargo-post (macOS only)
              if: contains(matrix.platform.target, 'apple-darwin')
              run: cargo install cargo-post

            - name: Build Client & Host with Cargo post-build (macOS only)
              if: contains(matrix.platform.target, 'apple-darwin')
              run: |
                  cargo post build --package open_remote_url_client --locked --release --target ${{ matrix.platform.target }}
                  cargo post build --package open_remote_url_host --locked --release --target ${{ matrix.platform.target }}

            - name: Build Client & Host with Cargo or Cross (non-macOS)
              if: "!contains(matrix.platform.target, 'apple-darwin') && matrix.platform.target != 'riscv64gc-unknown-linux-musl'"
              uses: actions-rs/cargo@v1
              with:
                  use-cross: ${{ matrix.platform.use-cross }}
                  command: build
                  args: --manifest-path Cargo.toml --locked --release --target ${{ matrix.platform.target }}

            - name: Build Client & Host RISCV with Cargo or Cross
              if: matrix.platform.target == 'riscv64gc-unknown-linux-musl'
              uses: actions-rs/cargo@v1
              env:
                  RUSTFLAGS: "-Ctarget-feature=+crt-static"
              with:
                  use-cross: ${{ matrix.platform.use-cross }}
                  command: build
                  args: --manifest-path Cargo.toml --locked --release --target ${{ matrix.platform.target }}

            - name: Determine Extra Files
              if: "!contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: |
                  if [[ "${{ matrix.platform.target }}" == *"-pc-windows-"* ]]; then
                    echo "EXTRA_FILES<<EOF" >> $GITHUB_ENV
                    echo "client/inactive.env" >> $GITHUB_ENV
                    echo "README.md" >> $GITHUB_ENV
                    echo "README.ja_JP.md" >> $GITHUB_ENV
                    echo "README.ja_EZ.md" >> $GITHUB_ENV
                    echo "README.zh_CN.md" >> $GITHUB_ENV
                    echo "EOF" >> $GITHUB_ENV

                    echo "HOST_EXTRA_FILES<<EOF" >> $GITHUB_ENV
                    echo "host/inactive.env" >> $GITHUB_ENV
                    echo "README.md" >> $GITHUB_ENV
                    echo "README.ja_JP.md" >> $GITHUB_ENV
                    echo "README.ja_EZ.md" >> $GITHUB_ENV
                    echo "README.zh_CN.md" >> $GITHUB_ENV
                    echo "EOF" >> $GITHUB_ENV
                  else
                    echo "EXTRA_FILES<<EOF" >> $GITHUB_ENV
                    echo "scripts/install/install.sh" >> $GITHUB_ENV
                    echo "scripts/uninstall/uninstall.sh" >> $GITHUB_ENV
                    echo "scripts/config/config.sh" >> $GITHUB_ENV
                    echo "client/inactive.env" >> $GITHUB_ENV
                    echo "README.md" >> $GITHUB_ENV
                    echo "README.ja_JP.md" >> $GITHUB_ENV
                    echo "README.ja_EZ.md" >> $GITHUB_ENV
                    echo "README.zh_CN.md" >> $GITHUB_ENV
                    echo "EOF" >> $GITHUB_ENV

                    echo "HOST_EXTRA_FILES<<EOF" >> $GITHUB_ENV
                    echo "scripts/install/install.sh" >> $GITHUB_ENV
                    echo "scripts/uninstall/uninstall.sh" >> $GITHUB_ENV
                    echo "scripts/config/config.sh" >> $GITHUB_ENV
                    echo "host/inactive.env" >> $GITHUB_ENV
                    echo "README.md" >> $GITHUB_ENV
                    echo "README.ja_JP.md" >> $GITHUB_ENV
                    echo "README.ja_EZ.md" >> $GITHUB_ENV
                    echo "README.zh_CN.md" >> $GITHUB_ENV
                    echo "EOF" >> $GITHUB_ENV
                  fi

            - name: Wait
              if: "!contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: sleep $((RANDOM % 20 + 3))
            - name: Release Client 1 (non-macOS)
              if: "!contains(matrix.platform.target, 'apple-darwin')"
              id: release-client-1
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url-client
              with:
                  working-directory: .
                  executable-name: open-remote-url-client
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }
            - name: Wait
              if: "failure() && !contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: sleep $((RANDOM % 20 + 5))
            - name: Release Client 2 (non-macOS)
              if: "failure() && !contains(matrix.platform.target, 'apple-darwin')"
              id: release-client-2
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url-client
              with:
                  working-directory: .
                  executable-name: open-remote-url-client
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }

            - name: Release Client (macOS only)
              if: "!cancelled() && contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: |
                  CLIENT_VERSION=$(cargo metadata --no-deps --manifest-path client/Cargo.toml --format-version 1 | jq -r '.packages[0].version')
                  TAG="open-remote-url-client-v${CLIENT_VERSION}"
                  gh release create "$TAG" --repo NaeCqde/open_remote_url --title "$TAG" || true
                  gh release upload "$TAG" \
                    "target/${{ matrix.platform.target }}/release/OpenRemoteURLClient.app.zip" \
                    client/inactive.env \
                    README.md README.ja_JP.md README.ja_EZ.md README.zh_CN.md \
                    --repo NaeCqde/open_remote_url --clobber

            - name: Wait
              if: "!contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: sleep $((RANDOM % 20 + 3))
            - name: Release Host 1 (non-macOS)
              if: "!contains(matrix.platform.target, 'apple-darwin')"
              id: release-host-1
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url_host
              with:
                  working-directory: .
                  executable-name: open-remote-url-host
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.HOST_EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }
            - name: Wait
              if: "failure() && !contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: sleep $((RANDOM % 20 + 5))
            - name: Release Host 2 (non-macOS)
              if: "failure() && !contains(matrix.platform.target, 'apple-darwin')"
              id: release-host-2
              uses: houseabsolute/actions-rust-release@v0
              env:
                  CRATE_NAME: open_remote_url_host
              with:
                  working-directory: .
                  executable-name: open-remote-url-host
                  target: ${{ matrix.platform.target }}
                  extra-files: ${{ env.HOST_EXTRA_FILES }}
                  _force-release-for-testing: true
                  action-gh-release-parameters: |
                      {
                          "repository": "NaeCqde/open_remote_url",
                          "token": "${{ secrets.GITHUB_TOKEN }}"
                      }

            - name: Release Host (macOS only)
              if: "!cancelled() && contains(matrix.platform.target, 'apple-darwin')"
              shell: bash
              run: |
                  HOST_VERSION=$(cargo metadata --no-deps --manifest-path host/Cargo.toml --format-version 1 | jq -r '.packages[0].version')
                  TAG="open-remote-url-host-v${HOST_VERSION}"
                  gh release create "$TAG" --repo NaeCqde/open_remote_url --title "$TAG" || true
                  gh release upload "$TAG" \
                    "target/${{ matrix.platform.target }}/release/OpenRemoteURLHost.app.zip" \
                    host/inactive.env \
                    README.md README.ja_JP.md README.ja_EZ.md README.zh_CN.md \
                    --repo NaeCqde/open_remote_url --clobber
